version: '3.8'

services:
  # 🛡️ 1. Gateway
  gateway-nginx:
    image: nginx:alpine
    ports:
      - "10610:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - my-frontend
      - my-backend
    networks:
      - app-network

  # 🎨 2. Frontend
  my-frontend:
    # ❌ ผิด: image: my-react-app
    # ✅ ถูก: สั่งให้สร้างจากโฟลเดอร์ frontend
    build: ./frontend       
    container_name: ft-frontend
    networks:
      - app-network

  # 🧠 3. Backend
  my-backend:
    # ❌ ผิด: image: my-node-api
    # ✅ ถูก: สั่งให้สร้างจากโฟลเดอร์ backend
    build: ./backend        
    container_name: ft-backend
    
    # อย่าลืมใส่ .env ให้ Backend ด้วย (สำคัญมากสำหรับของจริง)
    env_file:
      - ./backend/.env
      
    networks:
      - app-network

networks:
  app-network: