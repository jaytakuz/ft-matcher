server {
    listen 10610;        # ✅ บังคับฟัง Port 10610 ชัดเจน
    server_name localhost;
    server_tokens off;
    
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html; # ✅ รองรับ React Router (Refresh ไม่พัง)
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}